name: Feature request
description: Suggest an improvement to the starter
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Suggest a change that would help **most forks** of this starter — not one-off custom work.

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What limitation are you hitting?
      placeholder: There's no built-in way to filter products by price on the shop page…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Design system / UI components
        - CMS / content schema
        - Shop / commerce
        - Documentation
        - Build / deploy
        - Other
    validations:
      required: true
